# Netlify Configuration for AmaniYield Frontend
[build]
  base = "frontend"
  command = "npm run build"
  publish = "frontend/.next"
  functions = "frontend/netlify/functions"

# Redirect all routes to index for Next.js SPA behavior
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Environment variables
[context.production]
  environment = { NODE_ENV = "production", NODE_VERSION = "20.14.0" }

[context.deploy-preview]
  environment = { NODE_ENV = "development" }

# Cache settings
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
